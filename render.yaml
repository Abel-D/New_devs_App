services:
  # 1. Frontend Web Service
  - type: web
    name: propertyflow-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free # Change to "starter" or higher if needed
    envVars:
      - key: VITE_API_URL
        # NOTE: Update this value with your actual live backend URL after deployment
        value: https://onrender.com

  # 2. Backend Web Service
  - type: web
    name: propertyflow-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SECRET_KEY
        value: debug_challenge_secret # Recommended: move to a secret file/dashboard env later
      - key: DATABASE_URL
        fromDatabase:
          name: propertyflow-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: propertyflow-redis
          property: connectionString

# 3. Managed Redis Instance
redis:
  - name: propertyflow-redis
    plan: free # Free tier redis is ephemeral. Upgrade to keep data persisted.
    ipAllowList: [] # Restricts access only to your internal Render services

# 4. Managed PostgreSQL Database
databases:
  - name: propertyflow-db
    databaseName: propertyflow
    user: postgres
    plan: free
